        function loadDocs() {
            const content = document.getElementById('content');
            content.innerHTML = marked.parse(docsMarkdown);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');

            // 生成目录
            generateTOC();

        // 生成目录
        function generateTOC() {
            const toc = document.getElementById('toc');
            const headings = document.querySelectorAll('#content h2');

            toc.innerHTML = Array.from(headings).map(h => {
                const id = h.textContent.trim().replace(/\s+/g, '-');
                h.id = id;
                return `<a href="#${id}" class="block py-1 text-gray-600 hover:text-purple-600 transition">${h.textContent}</a>`;
            }).join('');
        }
