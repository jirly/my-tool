# 提示词工程入门指南

> 💡 掌握与 AI 高效沟通的艺术，让输出质量提升 10 倍

## 什么是提示词？

提示词（Prompt）是你与 AI 模型交流的方式。一个好的提示词可以让 AI 输出更准确、更有用的结果。

## 提示词的四个核心要素

### 1. 角色设定

告诉 AI 它应该扮演什么角色：

\`\`\`
你是一位资深的人力资源专家，擅长评估简历...
\`\`\`

### 2. 任务描述

清晰地说明你要 AI 做什么：

\`\`\`
请分析这份简历，找出候选人的 3 个核心优势和 2 个需要改进的地方...
\`\`\`

### 3. 输出格式

指定你期望的输出格式：

\`\`\`
请用表格形式输出，包含以下列：维度、评分（1-5 分）、评价说明...
\`\`\`

### 4. 约束条件

设置必要的限制和要求：

\`\`\`
回答请控制在 500 字以内，使用专业的 HR 术语...
\`\`\`

## 完整示例

### ❌ 糟糕的提示词

\`\`\`
帮我看看这份简历怎么样？
\`\`\`

### ✅ 优秀的提示词

\`\`\`
你是一位资深的人力资源专家，拥有 10 年互联网行业招聘经验。

请分析我提供的简历，完成以下任务：

2. 指出需要改进的地方（2 点）
3. 给出与"高级前端工程师"职位的匹配度评分（1-10 分）

输出要求：
- 使用专业的 HR 术语
- 每个要点不超过 50 字
- 最后给出是否建议录用的结论
\`\`\`

## 进阶技巧

### 少样本提示（Few-Shot Prompting）

给 AI 提供几个示例，让它更好地理解你的需求：

\`\`\`
请按照以下格式分析简历：

输入：张三，3 年前端经验，精通 React...

[你的简历内容]

\`\`\`
请一步步思考：
1. 首先，分析候选人的技术栈...

3. 最后，给出匹配度评分...

> 💬 零基础打造你的私人 AI 助手，支持群聊管理

- ✅ 群聊智能问答

### 方案对比

| 方案 | 难度 | 成本 | 稳定性 |
|------|------|------|--------|
| Wechaty | 中等 | 免费 | 较好 |
| 微精灵 | 简单 | 付费 | 一般 |
| 个人协议 | 困难 | 免费 | 有风险 |

> 本文推荐使用 **Wechaty** 方案，开源免费且稳定。

## 环境准备

### 1. 安装 Node.js

下载地址：https://nodejs.org/

\`\`\`bash
# 验证安装
node -v
npm -v
\`\`\`

### 2. 创建项目

\`\`\`bash
mkdir wechat-ai-bot
cd wechat-ai-bot
npm init -y
npm install wechaty @wechaty/plugin-contrib
\`\`\`

## 代码实现

### 基础机器人

创建文件 \`bot.js\`：

\`\`\`javascript
const { WechatyBuilder } = require('wechaty')

const bot = WechatyBuilder.build({
    name: 'my-ai-bot',
    puppet: 'wechaty-puppet-wechat4u'
})

bot.on('scan', (qrcode, status) => {
    console.log(\`二维码：https://wechaty.js.org/qrcode/\${encodeURIComponent(qrcode)}\`)
})

bot.on('login', user => {
    console.log(\`\${user.name()} 登录成功\`)
})

bot.on('message', async message => {
    console.log(\`收到消息：\${message.text()}\`)

    // 简单回复
    if (message.text().includes('你好')) {
        await message.say('你好呀！我是 AI 助手~')
    }
})

bot.start()
\`\`\`

### 接入 AI

修改 \`bot.js\`，接入扣子 API：

\`\`\`javascript
const axios = require('axios')

async function getAIResponse(question) {
    const response = await axios.post(
        'https://api.coze.cn/v1/chat',
        {
            bot_id: 'YOUR_BOT_ID',
            query: question
        },
        {
            headers: {
                'Authorization': 'Bearer YOUR_API_KEY'
            }
        }
    )
    return response.data.content
}

bot.on('message', async message => {
    // 忽略自己发的消息
    if (message.self()) return

    // 群聊且被@时才回复
    if (message.room() && await message.mentionSelf()) {
        const question = message.text().replace(/@.*/, '').trim()
        const answer = await getAIResponse(question)
        await message.say(answer)
    }

    // 私聊直接回复
    if (!message.room()) {
        const answer = await getAIResponse(message.text())
        await message.say(answer)
    }
})
\`\`\`

## 运行机器人

\`\`\`bash
node bot.js
\`\`\`

扫码登录即可！

cron.schedule('0 9 * * *', async () => {
    const room = await bot.Room.find({ topic: '我的群' })
    if (room) {
        await room.say('早安！今天是工作日，加油~')
    }
})
\`\`\`

### 3. 关键词回复

\`\`\`javascript
const keywords = {
    '价格': '我们的产品价格是...',
    '客服': '客服微信：xxx',
    '地址': '公司地址在...'
}

bot.on('message', async message => {
    const text = message.text()
    for (const [key, reply] of Object.entries(keywords)) {
        if (text.includes(key)) {
            await message.say(reply)
            break
        }
    }
})
\`\`\`

## 投递技巧

1. **定制简历**：每个职位都微调简历
2. **文件格式**：PDF 格式，命名：姓名_职位_年限
3. **投递时间**：周二至周四上午 9-11 点
4. **跟进策略**：一周后无回复可礼貌询问
