<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->

            </div>

            <!-- 操作按钮 -->
            <div class="flex justify-center space-x-4">

            <p class="text-center text-gray-500">© 2026 你的工具站。All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 从 URL 参数获取文档类型

        const docType = urlParams.get('type') || 'default';

        // 文档内容配置
        const docs = {
            'resume': {
                icon: '📄',

本工具使用先进的 NLP 模型进行文本分析，支持中英文双语处理。

\`\`\`
支持的文件格式：
- PDF (.pdf)
- Word (.doc, .docx)
- 纯文本 (.txt)
\`\`\`
`
            },
            'api': {
                icon: '⚡',
                title: '扣子 API 指令集',
                desc: '丰富的 API 接口调用指令集合',
                content: `
## API 指令集概述

本指令集提供了完整的扣子平台 API 调用能力，帮助你在影刀 RPA 流程中快速集成智能功能。

调用智能体进行对话，获取 AI 回复。

\`\`\`javascript
POST /api/chat
{
    "agent_id": "your_agent_id",
    "message": "用户消息",
    "conversation_id": "会话 ID"
}
\`\`\`

#### 2. 文件上传 API

上传文件到知识库。

\`\`\`javascript
POST /api/upload
{
    "file": "文件内容",
    "knowledge_base_id": "知识库 ID"
}
\`\`\`

#### 3. 知识库查询 API

查询知识库内容。

\`\`\`javascript
GET /api/knowledge/query?q=查询关键词
\`\`\`

## 使用示例

### 影刀 RPA 集成

1. 在影刀中创建 HTTP 请求节点
2. 配置请求 URL 和参数
3. 解析返回结果
4. 根据结果执行后续操作

### 代码示例

\`\`\`python
import requests

response = requests.post(
    'https://api.coze.cn/api/chat',
    json={
        'agent_id': '123456',
        'message': '你好'
    },
    headers={'Authorization': 'Bearer YOUR_TOKEN'}
)
print(response.json())
\`\`\`

## 错误码说明

| 错误码 | 说明 |
|--------|------|
| 200 | 成功 |
| 400 | 请求参数错误 |
| 401 | 认证失败 |
| 429 | 请求频率超限 |
| 500 | 服务器错误 |
`
            },
            'default': {
                icon: '🔧',

            }
        };

        // 加载文档
        function loadDoc() {
            const doc = docs[docType] || docs['default'];

            document.getElementById('docIcon').textContent = doc.icon;
            document.getElementById('docTitle').textContent = doc.title;
            document.getElementById('docDesc').textContent = doc.desc;
            document.getElementById('docContent').innerHTML = marked.parse(doc.content);

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        // 页面加载时执行
        loadDoc();
    </script>
</body>
</html>
